  :root {
    /* Colors from Figma design tokens */
    --surface-bg-base: #fafafa;
    --surface-bg-strong: #ffffff;
    --surface-inverse-base: #eeeff0;
    --surface-status-success: #effbf5;
    --border-base: #e3e4e5;
    --text-strong: #0a0c0d;
    --text-base: #212529;
    --text-subtle: #6a6e70;
    --text-action: #b41730;
    --text-status-success-strong: #29a366;
    --icon-base: #212529;
    --metro-m1: #007d55;
    --train-iclyn: #fdba58;
    --train-dsb-ic: #ec3400;
    --bus-yellow: #fdae00;

    /* Radii */
    --radius-large: 16px;
    --radius-full: 1000px;
    --device-radius: 44px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #d9dcdf;
    font-family: "Via Office", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- Phone screen: 375 x 812, rounded device corners ---- */
  .screen {
    position: relative;
    width: 375px;
    height: 812px;
    background: var(--surface-bg-base);
    border-radius: var(--device-radius);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
  }

  /* ---- iOS status bar ---- */
  .status-bar {
    height: 50px;
    padding: 21px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .status-bar .time {
    padding-left: 27px;
    font-family: -apple-system, "SF Pro", BlinkMacSystemFont, sans-serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 22px;
    color: #000;
  }
  .status-bar .levels {
    display: flex;
    align-items: center;
    gap: 7px;
    padding-right: 18px;
  }
  .status-bar .levels img,
  .status-bar .levels svg { display: block; height: 13px; }
  .status-bar .levels .cellular { width: 19.2px; }
  .status-bar .levels .wifi { width: 17.14px; }
  .status-bar .levels .battery { width: 27.33px; }

  /* ---- scrollable content ---- */
  .content {
    flex: 1 0 0;
    min-height: 0;
    overflow-y: auto;
    padding-bottom: 96px;
  }

  .screen-title {
    padding: 28px 16px 0;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-strong);
  }
  .section-label {
    padding: 24px 16px 12px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-strong);
  }

  /* ================= Ticket + Journey - Active ================= */
  .ticket-card {
    position: relative;
    isolation: isolate;
    width: 343px;
    margin: 0 16px;
    border-radius: var(--radius-large);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .ticket-card:active { transform: scale(0.985); }

  /* --- Upper block (map + journey) --- */
  .card-top {
    position: relative;
    background: var(--surface-bg-strong);
    border: 1px solid var(--border-base);
    border-bottom: 0;
    border-radius: var(--radius-large) var(--radius-large) 0 0;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.1));
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-bottom: 12px;
  }

  .map-wrap { padding: 4px 4px 0; position: relative; }
  .map {
    position: relative;
    width: 100%;
    aspect-ratio: 335 / 140;
    border-radius: 12px;
    overflow: hidden;
  }
  .map-img {
    position: absolute;
    width: 123.11%;
    height: 130.32%;
    left: -5.84%;
    top: -23.29%;
    max-width: none;
    display: block;
  }

  /* Visual Journey Representation: schematic route, at Figma's map coordinates */
  .vjr {
    position: absolute;
    left: 42px;
    top: 55.5px;
    width: 258px;
    height: 80.5px;
    pointer-events: none;
    z-index: 2;
  }
  .vjr-el { position: absolute; }
  .vjr-el svg { width: 100%; height: 100%; display: block; }
  .vjr-marker {
    position: absolute;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .vjr-marker svg { width: 20px; height: 20px; display: block; }
  .vjr-bus { background: var(--bus-yellow); }
  .vjr-train { background: var(--train-dsb-ic); }

  /* status row overlaid on the map */
  .status-row {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pill {
    display: flex;
    align-items: center;
    background: var(--surface-status-success);
    border-radius: 999px;
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.1));
  }
  .pill.text { padding: 4px 12px 4px 10px; gap: 5px; }
  .pill.text span {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: var(--text-status-success-strong);
    line-height: 20px;
    animation: tilTidenPulse 3s ease-in-out infinite;
  }
  /* slow "live" breathing on the on-time label */
  @keyframes tilTidenPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.76; }
  }

  /* live icon: animate signal lines dot -> dot+inner -> dot+all -> repeat */
  .live-icon { width: 20px; height: 20px; display: block; flex-shrink: 0; }
  /* arcs pop outward from the centre dot with a subtle bounce, then hold ~1.85s, repeat */
  .live-icon .arc { transform-box: view-box; transform-origin: 12px 12px; }
  .live-icon .arc-inner { animation: liveInner 2.5s cubic-bezier(0.34, 1.5, 0.64, 1) infinite; }
  .live-icon .arc-outer { animation: liveOuter 2.5s cubic-bezier(0.34, 1.5, 0.64, 1) infinite; }
  @keyframes liveInner {
    0%, 5% { opacity: 0; transform: scale(0.55); }
    13%, 100% { opacity: 1; transform: scale(1); }
  }
  @keyframes liveOuter {
    0%, 16% { opacity: 0; transform: scale(0.55); }
    26%, 100% { opacity: 1; transform: scale(1); }
  }

  /* journey */
  .journey { display: flex; flex-direction: column; gap: 8px; padding: 0 16px; }

  .stops { display: flex; flex-direction: column; gap: 4px; }
  .stop-rows { position: relative; }
  .stop {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 24px;
  }
  .stop img,
  .stop svg { width: 16px; height: 16px; display: block; flex-shrink: 0; }
  .stop .time,
  .stop .place {
    font-size: 16px;
    font-weight: 700;
    line-height: 24px;
    color: var(--text-strong);
    white-space: nowrap;
  }
  .stop .place {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* connector line between origin and pin */
  .connector {
    position: absolute;
    left: 7.5px;
    top: 21px;
    width: 1px;
    height: 5px;
    background: var(--icon-base);
    border-radius: 999px;
  }

  .details {
    font-size: 14px;
    font-weight: 400;
    line-height: 20px;
    color: var(--text-strong);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .details .sep { color: var(--text-base); }

  /* legs */
  .legs { display: flex; gap: 4px; align-items: center; }
  .leg {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 32px;
    min-width: 32px;
    padding: 8px;
    background: var(--surface-inverse-base);
    border-radius: 4px;
    border-bottom: 2px solid var(--border-base);
    overflow: hidden;
  }
  .leg.fill { flex: 1 0 0; }
  .leg.ic { border-bottom-color: var(--train-dsb-ic); }
  .leg.bus { border-bottom-color: var(--bus-yellow); }
  .leg img,
  .leg svg { width: 20px; height: 20px; display: block; }
  .leg span {
    font-size: 12px;
    font-weight: 400;
    line-height: 16px;
    color: var(--text-base);
    padding-top: 2px;
  }

  /* --- Tear divider --- */
  .tear {
    position: relative;
    height: 24px;
    width: 343px;
    background: var(--surface-bg-strong);
    border-left: 1px solid var(--border-base);
    border-right: 1px solid var(--border-base);
  }
  .tear::before,
  .tear::after {
    content: "";
    position: absolute;
    top: 0;
    width: 24px;
    height: 24px;
    background: var(--surface-bg-base);
    border-radius: 50%;
  }
  .tear::before { left: -12px; }
  .tear::after { right: -12px; }
  .tear .dash {
    position: absolute;
    left: 16px;
    right: 16px;
    top: 12px;
    border-top: 1px dashed var(--border-base);
  }

  /* --- Ticket footer --- */
  .card-bottom {
    position: relative;
    overflow: hidden;
    background: var(--surface-bg-strong);
    border: 1px solid var(--border-base);
    border-top: 0;
    border-radius: 0 0 var(--radius-large) var(--radius-large);
    filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.1));
    padding: 8px 16px 16px;
  }
  /* edge glow: fill + stroke that travel to the border point nearest the cursor */
  .edge-fx {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: var(--glow, 1);  /* 0 at card center -> 1 (full) at the edge */
  }
  /* size + intensity grow with --glow, so it's largest/strongest near the edge */
  .edge-fill {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      calc(150px + var(--glow, 1) * 170px) calc(150px + var(--glow, 1) * 170px) at var(--px, 12%) var(--py, 92%),
      rgba(41, 163, 102, 0.15) 0%,
      rgba(41, 163, 102, 0.08) 38%,
      rgba(41, 163, 102, 0.02) 58%,
      transparent 74%);
  }
  .edge-stroke {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 0 5px rgba(41, 163, 102, 0.4));
    -webkit-mask: radial-gradient(circle calc(85px + var(--glow, 1) * 115px) at var(--px, 12%) var(--py, 92%), #000 0%, #000 36%, transparent 80%);
            mask: radial-gradient(circle calc(85px + var(--glow, 1) * 115px) at var(--px, 12%) var(--py, 92%), #000 0%, #000 36%, transparent 80%);
  }
  .edge-stroke path {
    fill: none;
    stroke: rgba(41, 163, 102, 0.58);
    stroke-width: 1;
  }

  /* static border + shadow tracing the tear cutouts (shown even when there's no glow) */
  .cutout-outline {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    overflow: visible;
    pointer-events: none;
  }
  .cutout-outline path {
    fill: none;
    stroke: var(--border-base);
    stroke-width: 1;
  }
  .ticket-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ticket-label { display: flex; align-items: center; gap: 8px; }
  .ticket-label img,
  .ticket-label svg { width: 16px; height: 16px; display: block; }
  .ticket-label span {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.2px;
    line-height: 20px;
    color: var(--text-base);
  }
  .ticket-count { display: flex; align-items: center; gap: 4px; }
  .ticket-count img,
  .ticket-count svg { width: 16px; height: 16px; display: block; }
  .ticket-count span {
    font-size: 14px;
    font-weight: 400;
    line-height: 20px;
    color: var(--text-base);
  }

  /* ---- Bottom Tab Bar: iOS 26 Liquid Glass (matched to Figma kit) ---- */
  .tabbar {
    position: absolute;
    left: 20px;
    right: 20px;
    bottom: 22px;
    z-index: 10;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.72);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    backdrop-filter: blur(20px) saturate(1.8);
    border: 0.5px solid rgba(255, 255, 255, 0.7);
    /* faked glass/refraction: bright rim + soft inner light */
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.12),
      inset 0 1px 1px rgba(255, 255, 255, 0.95),
      inset 0 0 6px rgba(255, 255, 255, 0.6),
      inset 0 -1px 1px rgba(255, 255, 255, 0.35);
    overflow: hidden;
    isolation: isolate;
  }
  .tabbar .items { position: relative; z-index: 1; display: flex; height: 56px; }
  .tab {
    position: relative;
    isolation: isolate;
    --fill-0: #1a1a1a;
    flex: 1 0 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 0 4px;
    background: none;
    border: 0;
    cursor: pointer;
    font-family: inherit;
  }
  /* selected tab: neutral highlight capsule (kit uses #ededed) + accent icon/label */
  .tab.active { --fill-0: var(--text-action); }
  .tab.active::before {
    content: "";
    position: absolute;
    z-index: -1;
    inset: 4px 0;
    border-radius: 999px;
    background: #ededed;
  }
  .tab img,
  .tab svg { width: 24px; height: 24px; display: block; }
  .tab span {
    font-family: "Via Office", -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 10px;
    font-weight: 400;
    line-height: 12px;
    color: #1a1a1a;
  }
  .tab.active span { color: var(--text-action); }

  /* ---- Home Indicator ---- */
  .home-indicator {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: transparent;
    height: 34px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
  }
  .home-indicator .bar {
    width: 134px;
    height: 5px;
    border-radius: 999px;
    background: #0a0c0d;
  }

  @media (prefers-reduced-motion: reduce) {
    .live-icon .arc { animation: none; opacity: 1; transform: none; }
    .pill.text span { animation: none; opacity: 1; }
  }
</style>
</head>

        </div>
    </nav>
    <div class="home-indicator"><div class="bar"></div></div>
  </div>

  <script>
    (function () {
      var card = document.getElementById('ticketCard');
      var fx = card && card.querySelector('.edge-fx');
      if (!card || !fx) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var fill = fx.querySelector('.edge-fill');
      var strokeSvg = fx.querySelector('.edge-stroke');
      var strokePath = strokeSvg.querySelector('path');
      var tear = card.querySelector('.tear');
      var cutoutSvg = card.querySelector('.cutout-outline');
      var cutoutPath = cutoutSvg.querySelector('path');

      var R = 16, NR = 12;       // corner radius, notch radius
      var W = 0, H = 0, P = 0, NY = 0;  // card size, perimeter, notch-center y
      var target = null, cur = null;    // position as distance along the perimeter
      var glowT = 1, glowC = 1;         // intensity: 0 at card center -> 1 at the edge

      // ticket silhouette: rounded rect minus the two side cutouts (concave notches)
      function silhouette() {
        return 'M ' + R + ' 0' +
          ' H ' + (W - R) + ' A ' + R + ' ' + R + ' 0 0 1 ' + W + ' ' + R +
          ' V ' + (NY - NR) + ' A ' + NR + ' ' + NR + ' 0 0 0 ' + W + ' ' + (NY + NR) +
          ' V ' + (H - R) + ' A ' + R + ' ' + R + ' 0 0 1 ' + (W - R) + ' ' + H +
          ' H ' + R + ' A ' + R + ' ' + R + ' 0 0 1 0 ' + (H - R) +
          ' V ' + (NY + NR) + ' A ' + NR + ' ' + NR + ' 0 0 0 0 ' + (NY - NR) +
          ' V ' + R + ' A ' + R + ' ' + R + ' 0 0 1 ' + R + ' 0 Z';
      }

      function measure() {
        var r = card.getBoundingClientRect();
        W = r.width; H = r.height; P = 2 * (W + H);
        var tr = tear.getBoundingClientRect();
        NY = (tr.top - r.top) + tr.height / 2;
        return r;
      }

      // recompute the silhouette and apply it to the stroke path + fill clip
      function layout() {
        measure();
        var d = silhouette();
        strokePath.setAttribute('d', d);
        strokeSvg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
        fill.style.webkitClipPath = "path('" + d + "')";
        fill.style.clipPath = "path('" + d + "')";
        // static outline for the two side cutouts (inner semicircle arcs)
        var nd = 'M ' + W + ' ' + (NY - NR) + ' A ' + NR + ' ' + NR + ' 0 0 0 ' + W + ' ' + (NY + NR) +
                 ' M 0 ' + (NY + NR) + ' A ' + NR + ' ' + NR + ' 0 0 0 0 ' + (NY - NR);
        cutoutPath.setAttribute('d', nd);
        cutoutSvg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      }

      // perimeter param (px) of the border point nearest the cursor; 0 = top-left, clockwise
      function nearestParam(mx, my) {
        var r = measure();
        var x = Math.max(r.left, Math.min(mx, r.right));
        var y = Math.max(r.top, Math.min(my, r.bottom));
        var inside = mx > r.left && mx < r.right && my > r.top && my < r.bottom;
        if (inside) {
          var dl = mx - r.left, dr = r.right - mx, dt = my - r.top, db = r.bottom - my;
          var m = Math.min(dl, dr, dt, db);
          if (m === dl) x = r.left;
          else if (m === dr) x = r.right;
          else if (m === dt) y = r.top;
          else y = r.bottom;
        }
        var lx = x - r.left, ly = y - r.top, eps = 0.5;
        if (ly <= eps) return lx;               // top edge
        if (lx >= W - eps) return W + ly;       // right edge
        if (ly >= H - eps) return W + H + (W - lx); // bottom edge
        return 2 * W + H + (H - ly);            // left edge
      }

      // perimeter param -> card-local x/y
      function paramToXY(t) {
        t = ((t % P) + P) % P;
        if (t < W) return [t, 0];
        if (t < W + H) return [W, t - W];
        if (t < 2 * W + H) return [W - (t - (W + H)), H];
        return [0, H - (t - (2 * W + H))];
      }

      // 0 at the card center, 1 once the cursor reaches (or passes) the edge
      function intensity(mx, my) {
        var r = card.getBoundingClientRect();
        var nx = (mx - (r.left + r.width / 2)) / (r.width / 2);
        var ny = (my - (r.top + r.height / 2)) / (r.height / 2);
        var m = Math.min(1, Math.max(Math.abs(nx), Math.abs(ny)));
        return m * m;   // quadratic: dim across a wide central band, full only near the edge
      }

      function apply(t) {
        var p = paramToXY(t);
        fx.style.setProperty('--px', p[0].toFixed(1) + 'px');
        fx.style.setProperty('--py', p[1].toFixed(1) + 'px');
      }

      layout();
      window.addEventListener('resize', layout, { passive: true });

      window.addEventListener('mousemove', function (e) {
        target = nearestParam(e.clientX, e.clientY);
        glowT = intensity(e.clientX, e.clientY);
        if (reduce) { cur = target; glowC = glowT; apply(cur); fx.style.setProperty('--glow', glowC.toFixed(3)); }
      }, { passive: true });

      if (reduce) return;
      // ease along the perimeter, taking the shorter way around the loop
      (function loop() {
        if (target !== null) {
          if (cur === null) cur = target;
          var d = target - cur;
          if (d > P / 2) d -= P;
          else if (d < -P / 2) d += P;
          // glide while visible; snap while dim so it fades out near the centre and reappears at the new edge
          cur += d * (glowC < 0.3 ? 1 : 0.05);
          glowC += (glowT - glowC) * 0.5;
          apply(cur);
          fx.style.setProperty('--glow', glowC.toFixed(3));
        }
        requestAnimationFrame(loop);
      })();
    })();
  </script>
</body>
</html>
